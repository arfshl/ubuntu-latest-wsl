name: "Build arm64"

on:
  workflow_dispatch:
  schedule:
# Build Every Week
    - cron: "0 0 * * 0"
  push:
    branches: [ 'main' ]
    paths:
      - "build.sh"
      - ".github/workflows/*.yml"

permissions:
  contents: write  

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: start build
        run: |
          bash build.sh
      - name: Push to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ env.ARCH }}-${{ env.RELEASE }}
          name: Release ${{ env.ARCH }} ${{ env.RELEASE }}
          files: |
            ubuntu.zip
            rootfs.tar.gz
          preserve_order: true
          make_latest: true

env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}